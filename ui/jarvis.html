<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>J.A.R.V.I.S.</title>
<style>
  :root{
    /* state-driven accent — updated by JS */
    --accent: 56, 225, 255;      /* cyan */
    --accent2: 120, 240, 255;
    --gold: 255, 186, 64;
    --danger: 255, 74, 74;
    --bg: #02060b;
    --mono: "Cascadia Mono","Consolas","JetBrains Mono",ui-monospace,monospace;
    --sans: "Inter","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--bg); color:#cde9f2; font-family:var(--sans); cursor:default; user-select:none; }
  #stage{ position:fixed; inset:0; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ── HUD chrome overlay ── */
  .chrome{ position:fixed; inset:0; pointer-events:none; z-index:5; }
  .corner{ position:absolute; width:64px; height:64px; opacity:.55;
           border-color:rgba(var(--accent),.5); }
  .corner::before,.corner::after{ content:""; position:absolute; background:rgba(var(--accent),.6);
           box-shadow:0 0 8px rgba(var(--accent),.6); }
  .corner::before{ width:100%; height:2px; }
  .corner::after{ width:2px; height:100%; }
  .tl{ top:22px; left:22px } .tr{ top:22px; right:22px } .bl{ bottom:22px; left:22px } .br{ bottom:22px; right:22px }
  .tr::before,.tr::after{ right:0 } .bl::before{ bottom:0 } .bl::after{ bottom:0 } .br::before{ bottom:0; right:0 } .br::after{ bottom:0; right:0 }

  .topbar{ position:absolute; top:26px; left:0; right:0; display:flex; justify-content:center; gap:14px;
           font-family:var(--mono); font-size:12px; letter-spacing:.42em; text-transform:uppercase;
           color:rgba(var(--accent),.85); text-shadow:0 0 10px rgba(var(--accent),.5); }
  .topbar .dot{ width:7px;height:7px;border-radius:50%;background:rgb(var(--accent));align-self:center;
           box-shadow:0 0 10px rgb(var(--accent)); animation:blink 2.4s infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }

  .telemetry{ position:absolute; top:70px; left:32px; font-family:var(--mono); font-size:11px; line-height:1.9;
           color:rgba(var(--accent),.62); letter-spacing:.08em; }
  .telemetry b{ color:rgba(var(--accent2),.95); font-weight:600; }
  .telemetry .bar{ display:inline-block; width:80px; height:6px; margin-left:6px; vertical-align:middle;
           background:rgba(var(--accent),.15); border:1px solid rgba(var(--accent),.3); position:relative; }
  .telemetry .bar i{ position:absolute; inset:0; width:0%; background:rgba(var(--accent),.7);
           box-shadow:0 0 8px rgba(var(--accent),.6); transition:width .5s ease; }

  .clock{ position:absolute; top:70px; right:32px; text-align:right; font-family:var(--mono);
           font-size:11px; line-height:1.9; color:rgba(var(--accent),.62); letter-spacing:.08em; }
  .clock .big{ font-size:22px; color:rgba(var(--accent2),.95); letter-spacing:.14em; text-shadow:0 0 12px rgba(var(--accent),.4); }

  /* ── state label under reactor ── */
  .statelabel{ position:absolute; left:0; right:0; bottom:128px; text-align:center;
           font-family:var(--mono); font-size:13px; letter-spacing:.5em; text-transform:uppercase;
           color:rgba(var(--accent2),.95); text-shadow:0 0 16px rgba(var(--accent),.8); transition:color .4s, opacity .4s; }

  /* ── subtitle / transcript ── */
  .subs{ position:absolute; left:50%; transform:translateX(-50%); bottom:48px; width:min(76vw,900px);
           text-align:center; z-index:6; }
  .subs .user{ font-family:var(--mono); font-size:14px; letter-spacing:.05em; color:rgba(var(--accent),.7);
           margin-bottom:10px; min-height:18px; opacity:0; transition:opacity .3s; }
  .subs .user.show{ opacity:.85; }
  .subs .user::before{ content:"❯ "; color:rgba(var(--accent2),.9); }
  .subs .jarvis{ font-family:var(--sans); font-size:23px; font-weight:500; line-height:1.5;
           color:#e8fbff; text-shadow:0 0 22px rgba(var(--accent),.35); min-height:34px; }
  .subs .jarvis .cursor{ display:inline-block; width:9px; height:20px; margin-left:3px; vertical-align:middle;
           background:rgb(var(--accent2)); box-shadow:0 0 12px rgb(var(--accent)); animation:blink 1s steps(1) infinite; }

  /* ── boot overlay ── */
  #boot{ position:fixed; inset:0; z-index:20; background:#01040a; display:flex; flex-direction:column;
           justify-content:center; align-items:center; gap:2px; font-family:var(--mono); font-size:13px;
           letter-spacing:.14em; color:rgba(var(--accent),.9); transition:opacity 1.2s ease; }
  #boot .line{ opacity:0; }
  #boot .line b{ color:rgb(var(--accent2)); }
  #boot .line .ok{ color:#38ff9b; }
  #boot.hide{ opacity:0; pointer-events:none; }
  #boot .title{ font-family:var(--sans); font-weight:700; font-size:52px; letter-spacing:.34em;
           color:#eafcff; text-shadow:0 0 30px rgba(var(--accent),.7); margin-bottom:24px; opacity:0; }

  /* connection pill */
  .conn{ position:absolute; bottom:26px; right:32px; font-family:var(--mono); font-size:10px; letter-spacing:.24em;
           text-transform:uppercase; color:rgba(var(--accent),.5); z-index:6; }
  .conn.off{ color:rgba(var(--danger),.85); }

  .hint{ position:absolute; bottom:26px; left:32px; font-family:var(--mono); font-size:10px; letter-spacing:.2em;
           text-transform:uppercase; color:rgba(var(--accent),.4); z-index:6; }

  .powerbtn{ position:absolute; top:24px; right:30px; z-index:8; pointer-events:auto; cursor:pointer;
           width:26px; height:26px; border-radius:50%; border:1.5px solid rgba(var(--danger),.5);
           color:rgba(var(--danger),.8); display:flex; align-items:center; justify-content:center;
           font-size:14px; transition:all .2s; background:rgba(255,74,74,.06); }
  .powerbtn:hover{ background:rgba(255,74,74,.2); box-shadow:0 0 14px rgba(var(--danger),.6); color:#fff; }

  .gear{ position:absolute; top:24px; right:64px; z-index:8; pointer-events:auto; cursor:pointer;
           width:26px; height:26px; border-radius:50%; border:1.5px solid rgba(var(--accent),.5);
           color:rgba(var(--accent),.85); display:flex; align-items:center; justify-content:center;
           font-size:15px; transition:all .2s; background:rgba(56,225,255,.06); }
  .gear:hover{ background:rgba(56,225,255,.18); box-shadow:0 0 14px rgba(var(--accent),.6); color:#fff; transform:rotate(45deg); }

  /* ── text command bar ── */
  .cmdbar{ position:absolute; left:50%; transform:translateX(-50%) translateY(20px); bottom:14px;
           width:min(70vw,720px); z-index:9; pointer-events:auto; opacity:0; transition:opacity .25s, transform .25s;
           display:flex; align-items:center; gap:10px; padding:10px 16px;
           background:rgba(4,14,24,.82); border:1px solid rgba(var(--accent),.4);
           border-radius:10px; box-shadow:0 0 26px rgba(var(--accent),.22), inset 0 0 20px rgba(var(--accent),.06);
           backdrop-filter:blur(6px); }
  .cmdbar.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .cmdbar .chev{ font-family:var(--mono); color:rgba(var(--accent2),.9); font-size:16px; }
  .cmdbar input{ flex:1; background:transparent; border:none; outline:none; color:#e8fbff;
           font-family:var(--sans); font-size:17px; letter-spacing:.01em; }
  .cmdbar input::placeholder{ color:rgba(var(--accent),.45); }
  .cmdbar .send{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase;
           color:rgba(var(--accent),.6); cursor:pointer; padding:4px 8px; border:1px solid rgba(var(--accent),.35); border-radius:6px; }
  .cmdbar .send:hover{ color:#fff; background:rgba(56,225,255,.15); }

  /* ── settings panel ── */
  .settings{ position:fixed; inset:0; z-index:15; display:none; align-items:center; justify-content:center;
           background:rgba(1,4,10,.72); backdrop-filter:blur(4px); pointer-events:auto; }
  .settings.show{ display:flex; }
  .panel{ width:min(92vw,560px); max-height:88vh; overflow-y:auto; padding:26px 30px;
           background:linear-gradient(180deg, rgba(6,18,30,.96), rgba(3,10,18,.98));
           border:1px solid rgba(var(--accent),.45); border-radius:14px;
           box-shadow:0 0 50px rgba(var(--accent),.25), inset 0 0 40px rgba(var(--accent),.05); }
  .panel h2{ font-family:var(--mono); font-size:15px; letter-spacing:.34em; text-transform:uppercase;
           color:rgba(var(--accent2),.95); text-shadow:0 0 12px rgba(var(--accent),.5); margin-bottom:4px; }
  .panel .sub{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:rgba(var(--accent),.5); margin-bottom:20px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase;
           color:rgba(var(--accent),.72); margin-bottom:7px; }
  .field select,.field input[type=text],.field input[type=password]{
           width:100%; padding:9px 12px; background:rgba(2,8,14,.9); color:#dff6ff;
           border:1px solid rgba(var(--accent),.32); border-radius:8px; font-family:var(--sans); font-size:14px; outline:none; }
  .field select:focus,.field input:focus{ border-color:rgba(var(--accent),.75); box-shadow:0 0 12px rgba(var(--accent),.3); }
  .field input[type=range]{ width:100%; accent-color:rgb(var(--accent)); }
  .field .rangeval{ font-family:var(--mono); font-size:11px; color:rgba(var(--accent2),.9); float:right; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .panel .actions{ display:flex; gap:12px; margin-top:24px; }
  .panel .btn{ flex:1; padding:11px; text-align:center; font-family:var(--mono); font-size:12px; letter-spacing:.2em;
           text-transform:uppercase; cursor:pointer; border-radius:9px; transition:all .2s; }
  .panel .btn.save{ background:rgba(56,225,255,.16); color:#eafcff; border:1px solid rgba(var(--accent),.6); }
  .panel .btn.save:hover{ background:rgba(56,225,255,.32); box-shadow:0 0 18px rgba(var(--accent),.5); }
  .panel .btn.cancel{ background:transparent; color:rgba(var(--accent),.6); border:1px solid rgba(var(--accent),.28); }
  .panel .btn.cancel:hover{ color:#fff; }
  .hide-field{ display:none !important; }

  @media (prefers-reduced-motion: reduce){ .dot,.subs .jarvis .cursor{ animation:none } .gear:hover{ transform:none } }
</style>
</head>
<body>
  <div id="stage"><canvas id="c"></canvas></div>

  <div class="chrome">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="topbar"><span class="dot"></span><span id="brand">J . A . R . V . I . S .</span><span id="online">SYSTEM ONLINE</span></div>

    <div class="telemetry" id="telemetry">
      <div>CPU <span class="bar"><i id="cpuBar"></i></span> <b id="cpuVal">--</b></div>
      <div>MEM <span class="bar"><i id="memBar"></i></span> <b id="memVal">--</b></div>
      <div>NET <b id="netVal">SECURE</b></div>
      <div>PWR <b id="pwrVal">ARC-REACTOR</b></div>
    </div>

    <div class="clock">
      <div class="big" id="clockTime">--:--</div>
      <div id="clockDate">------</div>
      <div id="brainVal" style="margin-top:8px">BRAIN: ----</div>
    </div>

    <div class="statelabel" id="stateLabel">STANDBY</div>
  </div>

  <div class="subs">
    <div class="user" id="userLine"></div>
    <div class="jarvis" id="jarvisLine"></div>
  </div>

  <div class="hint" id="hint">SAY “HEY JARVIS” &nbsp;·&nbsp; CLAP CLAP &nbsp;·&nbsp; SPACE = TALK &nbsp;·&nbsp; T = TYPE</div>
  <div class="conn off" id="conn">LINK: OFFLINE</div>
  <div class="gear" id="gear" title="Settings">&#x2699;</div>
  <div class="powerbtn" id="powerbtn" title="Power down JARVIS">&#x23FB;</div>

  <!-- typed-command bar -->
  <div class="cmdbar" id="cmdbar">
    <span class="chev">❯</span>
    <input id="cmdinput" type="text" autocomplete="off" spellcheck="false"
           placeholder="Type a command for JARVIS…  (Enter to send · Esc to close)" />
    <span class="send" id="cmdsend">Send</span>
  </div>

  <!-- settings panel -->
  <div class="settings" id="settings">
    <div class="panel">
      <h2>System Configuration</h2>
      <div class="sub">MODELS · VOICE · INPUT</div>

      <div class="field">
        <label>Brain (AI model)</label>
        <select id="set_brain">
          <option value="claude">Claude — your subscription (best)</option>
          <option value="groq">Groq — free API (llama-3.3-70b)</option>
          <option value="ollama">Ollama — local, offline</option>
        </select>
      </div>
      <div class="field hide-field" id="f_groq">
        <label>Groq API key</label>
        <input id="set_groq_key" type="password" placeholder="paste free key from console.groq.com" />
      </div>
      <div class="field hide-field" id="f_ollama">
        <label>Ollama model name</label>
        <input id="set_ollama_model" type="text" placeholder="llama3.2" />
      </div>

      <div class="row2">
        <div class="field">
          <label>Speech-to-text model</label>
          <select id="set_whisper">
            <option value="tiny">Tiny — fastest</option>
            <option value="base">Base — balanced</option>
            <option value="small">Small — accurate</option>
            <option value="medium">Medium — best (slow)</option>
          </select>
        </div>
        <div class="field">
          <label>Voice engine</label>
          <select id="set_engine">
            <option value="edge">Edge — neural (online)</option>
            <option value="sapi">Windows — offline</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Voice</label>
        <select id="set_voice">
          <option value="en-GB-RyanNeural">Ryan — British male (default)</option>
          <option value="en-GB-ThomasNeural">Thomas — British male</option>
          <option value="en-GB-SoniaNeural">Sonia — British female</option>
          <option value="en-US-GuyNeural">Guy — US male</option>
          <option value="en-US-ChristopherNeural">Christopher — US male (deep)</option>
          <option value="en-US-EricNeural">Eric — US male</option>
          <option value="en-US-AriaNeural">Aria — US female</option>
          <option value="en-US-JennyNeural">Jenny — US female</option>
          <option value="en-AU-WilliamNeural">William — Australian male</option>
          <option value="en-IN-PrabhatNeural">Prabhat — Indian male</option>
        </select>
      </div>

      <div class="row2">
        <div class="field">
          <label>Wake sensitivity <span class="rangeval" id="wsval">0.50</span></label>
          <input id="set_wake" type="range" min="0.2" max="0.8" step="0.05" value="0.5" />
        </div>
        <div class="field">
          <label>Voice input</label>
          <select id="set_envoice">
            <option value="true">On — microphone</option>
            <option value="false">Off — keyboard only</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Clap to activate</label>
          <select id="set_clap">
            <option value="2">Double clap</option>
            <option value="1">Single clap</option>
            <option value="off">Off</option>
          </select>
        </div>
        <div class="field">
          <label>Clap loudness needed <span class="rangeval" id="csval">0.22</span></label>
          <input id="set_clapsens" type="range" min="0.08" max="0.6" step="0.02" value="0.22" />
        </div>
      </div>

      <div class="field">
        <label>Address me as</label>
        <input id="set_title" type="text" placeholder="sir" />
      </div>

      <div class="actions">
        <div class="btn cancel" id="set_cancel">Cancel</div>
        <div class="btn save" id="set_save">Apply</div>
      </div>
    </div>
  </div>

  <div id="boot">
    <div class="title" id="bootTitle">J.A.R.V.I.S.</div>
    <div id="bootLines"></div>
  </div>

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════════════
   J.A.R.V.I.S. HUD  —  pure canvas arc-reactor, audio-reactive, no CDNs
   Driven over WebSocket by the Python core (ws://127.0.0.1:8765).
   ═══════════════════════════════════════════════════════════════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=0,H=0,CX=0,CY=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = canvas.width  = Math.floor(innerWidth  * DPR);
  H = canvas.height = Math.floor(innerHeight * DPR);
  canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px';
  CX = W/2; CY = H/2;
}
addEventListener('resize', resize); resize();

/* ── palette per state ─────────────────────────────────────────── */
const PALETTE = {
  idle:      { a:[56,225,255],  b:[120,240,255], label:'STANDBY',    spin:1.0 },
  listening: { a:[56,225,255],  b:[150,255,255], label:'LISTENING',  spin:1.5 },
  thinking:  { a:[255,186,64],  b:[255,220,130], label:'PROCESSING', spin:2.6 },
  speaking:  { a:[80,235,255],  b:[190,250,255], label:'SPEAKING',   spin:1.8 },
  error:     { a:[255,74,74],   b:[255,150,150], label:'FAULT',      spin:2.0 },
  offline:   { a:[90,120,140],  b:[130,160,180], label:'OFFLINE',    spin:0.4 },
};

const S = {
  mode:'idle',
  level:0, levelTarget:0,          // 0..1 audio amplitude (smoothed)
  spectrum:new Array(64).fill(0),  // 0..1 per bin (smoothed)
  spectrumTarget:new Array(64).fill(0),
  col:{ a:[56,225,255], b:[120,240,255] }, // current (lerped) colors
  colTarget:{ a:[56,225,255], b:[120,240,255] },
  spin:1.0, spinTarget:1.0,
  t:0,
  ignite:0,        // 0..1 reactor power-on
  flash:0,         // 0..1 bloom pulse on state change / clap
  clap:0,          // 0..1 clap impulse, decays fast — drives the shockburst
};
const ripples=[]; // expanding shockwave rings
function spawnRipple(strength){
  if(ripples.length>=6) ripples.shift();   // bound the array — bursts of pulses can't pile up
  const base=Math.min(W,H)*0.235;
  ripples.push({ r:base*0.45, life:1, str:strength||1 });
}

function setMode(m){
  if(!PALETTE[m]) m='idle';
  S.mode=m;
  const p=PALETTE[m];
  S.colTarget={a:p.a.slice(),b:p.b.slice()};
  S.spinTarget=p.spin;
  const el=document.getElementById('stateLabel');
  el.textContent=p.label;
  document.documentElement.style.setProperty('--accent', p.a.join(','));
  document.documentElement.style.setProperty('--accent2', p.b.join(','));
  S.flash=1;                                  // bloom pulse on every transition
  if(m==='listening'||m==='speaking'||m==='thinking') spawnRipple(1);
}

/* ── particles orbiting the reactor ────────────────────────────── */
const particles=[];
function seedParticles(n){
  for(let i=0;i<n;i++){
    const r=(120+Math.random()*220);
    particles.push({ ang:Math.random()*Math.PI*2, rad:r, base:r,
      spd:(0.0015+Math.random()*0.004)*(Math.random()<.5?-1:1),
      size:0.6+Math.random()*1.8, tw:Math.random()*Math.PI*2 });
  }
}
seedParticles(90);

/* ── helpers ───────────────────────────────────────────────────── */
const lerp=(a,b,t)=>a+(b-a)*t;
function lerpArr(a,b,t){ for(let i=0;i<a.length;i++) a[i]=lerp(a[i],b[i],t); }
const rgba=(c,al)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${al})`;

/* ── main render loop ──────────────────────────────────────────── */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now; S.t+=dt;

  // smooth values
  S.level = lerp(S.level, S.levelTarget, 0.18);
  S.levelTarget *= 0.90; // decay so it falls back when no updates
  lerpArr(S.spectrum, S.spectrumTarget, 0.25);
  for(let i=0;i<S.spectrumTarget.length;i++) S.spectrumTarget[i]*=0.92;
  lerpArr(S.col.a, S.colTarget.a, 0.06);
  lerpArr(S.col.b, S.colTarget.b, 0.06);
  S.spin = lerp(S.spin, S.spinTarget, 0.05);
  S.ignite = lerp(S.ignite, 1, 0.03);
  S.flash *= 0.90;
  S.clap  *= 0.86;

  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawGrid();
  // everything glowing is drawn additively so overlapping light blooms (movie look)
  ctx.globalCompositeOperation = 'lighter';
  drawOrbits();
  drawRadar();
  drawReactor();
  drawWaveform();
  drawFreqBars();
  drawParticles();
  drawRipples(dt);
  drawClapBurst(dt);
  drawLightning(dt);
  drawHoloVeil(dt);          // holographic veil sits over everything (drawn last)
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(frame);
}

function drawBackground(){
  const g=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.7);
  const c=S.col.a;
  g.addColorStop(0, rgba(c, 0.10+0.05*S.level));
  g.addColorStop(0.35, 'rgba(3,10,18,0.6)');
  g.addColorStop(1, 'rgba(1,3,7,1)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawGrid(){
  ctx.save();
  ctx.globalAlpha=0.05*S.ignite;
  ctx.strokeStyle=rgba(S.col.a,0.5); ctx.lineWidth=1*DPR;
  const step=46*DPR;
  ctx.beginPath();
  for(let x=(CX%step);x<W;x+=step){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=(CY%step);y<H;y+=step){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
  ctx.restore();
}

/* concentric HUD rings with tick marks & rotating arcs */
function drawOrbits(){
  const base=Math.min(W,H)*0.235;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.a, b=S.col.b;

  // outer degree ring with ticks
  ring(base*1.28, 0.30, c, 1.2, S.t*0.05*S.spin);
  ticks(base*1.28, 120, c, 0.5);

  // rotating broken arcs
  brokenArc(base*1.12, S.t*0.4*S.spin,  [0.0,0.22,0.4,0.62,0.75,0.95], c, 3);
  brokenArc(base*0.98, -S.t*0.55*S.spin,[0.1,0.3,0.55,0.7], b, 2);

  // reticle crosshair segments
  ctx.globalAlpha=0.5*S.ignite; ctx.strokeStyle=rgba(c,0.5); ctx.lineWidth=1.4*DPR;
  for(let k=0;k<4;k++){
    const a=k*Math.PI/2 + S.t*0.1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*base*1.34, Math.sin(a)*base*1.34);
    ctx.lineTo(Math.cos(a)*base*1.42, Math.sin(a)*base*1.42);
    ctx.stroke();
  }
  ctx.restore();
}

function ring(r,alpha,c,lw,rot){
  ctx.save(); ctx.rotate(rot);
  ctx.globalAlpha=alpha*S.ignite; ctx.strokeStyle=rgba(c,0.8); ctx.lineWidth=lw*DPR;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke(); ctx.restore();
}
function ticks(r,n,c,alpha){
  ctx.save(); ctx.globalAlpha=alpha*S.ignite; ctx.strokeStyle=rgba(c,0.7); ctx.lineWidth=1*DPR;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2; const big=(i%10===0);
    const r1=r, r2=r+(big?10:5)*DPR;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1); ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); ctx.stroke();
  }
  ctx.restore();
}
function brokenArc(r,rot,segs,c,lw){
  ctx.save(); ctx.rotate(rot); ctx.globalAlpha=0.8*S.ignite;
  ctx.strokeStyle=rgba(c,0.9); ctx.lineWidth=lw*DPR; ctx.lineCap='round';
  ctx.shadowBlur=12*DPR; ctx.shadowColor=rgba(c,0.7);
  for(let i=0;i<segs.length;i+=2){
    const a0=segs[i]*Math.PI*2, a1=(segs[i+1]??(segs[i]+0.12))*Math.PI*2;
    ctx.beginPath(); ctx.arc(0,0,r,a0,a1); ctx.stroke();
  }
  ctx.restore();
}

/* the arc-reactor core */
function drawReactor(){
  const base=Math.min(W,H)*0.235;
  const pulse=0.5+0.5*Math.sin(S.t*2.2);
  const lvl=S.level;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.a, b=S.col.b;

  // outer glow halo (reacts to level)
  const halo=ctx.createRadialGradient(0,0,base*0.2,0,0,base*(0.95+lvl*0.5));
  halo.addColorStop(0, rgba(b,0.55+lvl*0.45));
  halo.addColorStop(0.5, rgba(c,0.22));
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha=S.ignite; ctx.fillStyle=halo;
  ctx.beginPath(); ctx.arc(0,0,base*(1.0+lvl*0.5),0,Math.PI*2); ctx.fill();

  // reactor housing ring
  ctx.globalAlpha=S.ignite;
  ctx.lineWidth=6*DPR; ctx.strokeStyle=rgba(c,0.85);
  ctx.shadowBlur=24*DPR; ctx.shadowColor=rgba(c,0.9);
  ctx.beginPath(); ctx.arc(0,0,base*0.62,0,Math.PI*2); ctx.stroke();

  // inner coil segments (the classic arc-reactor "triangle-in-circle" coils)
  const coils=9;
  ctx.lineWidth=3*DPR; ctx.strokeStyle=rgba(b,0.9);
  for(let i=0;i<coils;i++){
    const a0=(i/coils)*Math.PI*2 + S.t*0.15;
    const a1=a0 + (Math.PI*2/coils)*0.62;
    ctx.beginPath(); ctx.arc(0,0,base*0.5,a0,a1); ctx.stroke();
  }

  // inner triangle (iconic)
  ctx.shadowBlur=18*DPR;
  ctx.globalAlpha=S.ignite*(0.8);
  ctx.strokeStyle=rgba(b,0.9); ctx.lineWidth=2.4*DPR;
  ctx.save(); ctx.rotate(S.t*0.2);
  ctx.beginPath();
  for(let i=0;i<3;i++){ const a=i*Math.PI*2/3 - Math.PI/2; const r=base*0.30;
    i? ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r) : ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r); }
  ctx.closePath(); ctx.stroke(); ctx.restore();

  // bright core — white-hot centre with a coloured bloom
  const coreR=base*(0.21+lvl*0.12+pulse*0.025);
  const core=ctx.createRadialGradient(0,0,0,0,0,coreR*1.9);
  core.addColorStop(0,'rgba(255,255,255,'+(1.0*S.ignite)+')');
  core.addColorStop(0.22,'rgba(255,255,255,'+(0.9*S.ignite)+')');
  core.addColorStop(0.5, rgba(b,0.95*S.ignite));
  core.addColorStop(1,'rgba(0,0,0,0)');
  ctx.shadowBlur=55*DPR; ctx.shadowColor=rgba(b,1.0);
  ctx.fillStyle=core; ctx.beginPath(); ctx.arc(0,0,coreR*1.9,0,Math.PI*2); ctx.fill();
  // a second tight white kernel for that "hot" centre
  const kernel=ctx.createRadialGradient(0,0,0,0,0,coreR*0.6);
  kernel.addColorStop(0,'rgba(255,255,255,'+(1.0*S.ignite)+')');
  kernel.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=kernel; ctx.beginPath(); ctx.arc(0,0,coreR*0.6,0,Math.PI*2); ctx.fill();

  // transient bloom on state change / clap
  if(S.flash>0.02){
    const fb=ctx.createRadialGradient(0,0,0,0,0,base*0.95);
    fb.addColorStop(0, rgba(b,0.55*S.flash)); fb.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=S.flash*S.ignite; ctx.fillStyle=fb;
    ctx.beginPath(); ctx.arc(0,0,base*0.95,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

/* radar sweep — rotating wedge in the listening state (conic gradient) */
function drawRadar(){
  if(S.mode!=='listening') return;
  const base=Math.min(W,H)*0.235;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.b;
  try{
    ctx.beginPath();
    ctx.arc(0,0,base*1.16,0,Math.PI*2);
    ctx.arc(0,0,base*0.64,0,Math.PI*2,true);
    ctx.clip('evenodd');
    const cg=ctx.createConicGradient(S.t*2.0,0,0);
    cg.addColorStop(0.00, rgba(c,0.0));
    cg.addColorStop(0.02, rgba(c,0.34));
    cg.addColorStop(0.16, rgba(c,0.0));
    cg.addColorStop(1.00, rgba(c,0.0));
    ctx.globalAlpha=S.ignite*0.8; ctx.fillStyle=cg;
    ctx.beginPath(); ctx.arc(0,0,base*1.16,0,Math.PI*2); ctx.fill();
  }catch(e){ /* createConicGradient unsupported → skip */ }
  ctx.restore();
}

/* radial audio bars — react to the spectrum during listening/speaking */
function drawFreqBars(){
  if(S.mode!=='speaking' && S.mode!=='listening') return;
  const base=Math.min(W,H)*0.235, r0=base*0.72;
  const n=S.spectrum.length;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.b;
  // No per-bar shadowBlur (that was 64 shadow passes/frame) — the additive 'lighter'
  // compositing already blooms the bars; a wider line keeps the glow.
  ctx.strokeStyle=rgba(c,0.95); ctx.lineWidth=3.2*DPR; ctx.lineCap='round';
  for(let i=0;i<n;i++){
    const v=S.spectrum[i]; if(v<0.03) continue;
    const a=(i/n)*Math.PI*2 - Math.PI/2;
    const len=v*base*0.42;
    ctx.globalAlpha=S.ignite*(0.35+0.65*v);   // per-bar brightness preserved
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r0, Math.sin(a)*r0);
    ctx.lineTo(Math.cos(a)*(r0+len), Math.sin(a)*(r0+len));
    ctx.stroke();
  }
  ctx.restore();
}

/* expanding shockwave rings (state change / clap) */
function drawRipples(dt){
  if(!ripples.length) return;
  const base=Math.min(W,H)*0.235;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.b;
  for(let i=ripples.length-1;i>=0;i--){
    const rp=ripples[i];
    rp.r += base*1.7*dt; rp.life -= dt*0.75;
    if(rp.life<=0){ ripples.splice(i,1); continue; }
    ctx.globalAlpha=Math.max(0,rp.life)*0.6*rp.str;
    ctx.strokeStyle=rgba(c,0.9); ctx.lineWidth=(1.5+2*rp.life)*DPR;
    ctx.shadowBlur=18*DPR; ctx.shadowColor=rgba(c,0.8);
    ctx.beginPath(); ctx.arc(0,0,rp.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

/* circular audio-reactive waveform (uses spectrum bins) */
function drawWaveform(){
  if(S.mode!=='speaking' && S.mode!=='listening') return;   // no audio → skip the ring
  const base=Math.min(W,H)*0.235;
  const r0=base*0.66;
  const bins=S.spectrum.length;
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.b;
  ctx.globalAlpha=S.ignite; ctx.strokeStyle=rgba(c,0.9); ctx.lineWidth=2*DPR;
  ctx.shadowBlur=14*DPR; ctx.shadowColor=rgba(c,0.8);
  // mirror the spectrum around the circle for symmetry
  ctx.beginPath();
  const total=bins*2;
  for(let i=0;i<=total;i++){
    const idx = i<bins ? i : (total-1-i);
    const v = S.spectrum[Math.max(0,Math.min(bins-1,idx))];
    const a=(i/total)*Math.PI*2 - Math.PI/2;
    const rr=r0 + v*base*0.5 + S.level*base*0.06;
    const x=Math.cos(a)*rr, y=Math.sin(a)*rr;
    i? ctx.lineTo(x,y): ctx.moveTo(x,y);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

function drawParticles(){
  ctx.save(); ctx.translate(CX,CY);
  const c=S.col.b;
  for(const p of particles){
    p.ang += p.spd*(1+S.level*1.5)*S.spin;
    p.tw += 0.05;
    const rad=(p.base + Math.sin(S.t*0.5+p.tw)*8)*DPR*0.5 + p.base*0.5;
    const x=Math.cos(p.ang)*rad, y=Math.sin(p.ang)*rad;
    const tw=0.4+0.6*(0.5+0.5*Math.sin(p.tw));
    ctx.globalAlpha=tw*0.7*S.ignite;
    ctx.fillStyle=rgba(c,0.9); ctx.shadowBlur=6*DPR; ctx.shadowColor=rgba(c,0.8);
    ctx.beginPath(); ctx.arc(x,y,p.size*DPR,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ── CLAP SHOCKBURST ─────────────────────────────────────────────
   A radial spray of energy shards + a hard ripple + core flash, fired
   the instant a clap is detected. Shards decelerate and fade so the
   burst reads as a discharge from the reactor riding the shockwave. */
const clapShards=[];
function triggerClap(){
  S.clap=1; S.flash=1;
  spawnRipple(1.6);
  spawnRipple(1.1);              // double front for a denser wall
  const base=Math.min(W,H)*0.235;
  const n=26;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2 + Math.random()*0.18;
    const spd=(2.4+Math.random()*3.2)*base*0.006*DPR*60; // px/sec-ish
    clapShards.push({ a, r:base*0.5, vr:spd, life:1,
      len:(10+Math.random()*22)*DPR, w:(1+Math.random()*1.6)*DPR });
  }
}
function drawClapBurst(dt){
  if(!clapShards.length) return;
  const c=S.col.b;
  ctx.save(); ctx.translate(CX,CY);
  ctx.lineCap='round';
  ctx.shadowBlur=14*DPR; ctx.shadowColor=rgba(c,0.85);
  for(let i=clapShards.length-1;i>=0;i--){
    const s=clapShards[i];
    s.r += s.vr*dt;
    s.vr *= 0.92;               // decelerate
    s.life -= dt*1.6;
    if(s.life<=0){ clapShards.splice(i,1); continue; }
    const ca=Math.cos(s.a), sa=Math.sin(s.a);
    const r1=s.r, r2=s.r + s.len*s.life;
    ctx.globalAlpha=Math.max(0,s.life)*0.9*S.ignite;
    ctx.strokeStyle=rgba(c,0.95); ctx.lineWidth=s.w*(0.4+s.life);
    ctx.beginPath(); ctx.moveTo(ca*r1, sa*r1); ctx.lineTo(ca*r2, sa*r2); ctx.stroke();
  }
  // bright leading rim while the clap impulse is fresh
  if(S.clap>0.05){
    const base=Math.min(W,H)*0.235;
    ctx.globalAlpha=S.clap*0.5*S.ignite;
    ctx.strokeStyle=rgba(c,0.9); ctx.lineWidth=(2+3*S.clap)*DPR;
    ctx.shadowBlur=26*DPR;
    ctx.beginPath(); ctx.arc(0,0, base*(0.55+(1-S.clap)*0.6),0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

/* ── ENERGY LIGHTNING ────────────────────────────────────────────
   Jagged bolts arcing from the reactor housing to the outer ring while
   JARVIS is thinking (and a weaker crackle when audio level spikes).
   Bolts are regenerated on a timer so they flicker like real arcs. */
let _boltTimer=0, _bolts=[];
function _makeBolt(a, rInner, rOuter, jitter){
  const pts=[]; const segs=7;
  for(let i=0;i<=segs;i++){
    const t=i/segs;
    const rr=rInner + (rOuter-rInner)*t;
    const taper=Math.sin(t*Math.PI);              // wobble tapers to 0 at both ends
    const off=(Math.random()*2-1)*jitter*taper;
    const pa=a + off/rr;
    pts.push([Math.cos(pa)*rr, Math.sin(pa)*rr]);
  }
  return pts;
}
function drawLightning(dt){
  const active = S.mode==='thinking';
  const boost  = Math.max(0, S.level-0.55);       // audio spikes crackle too
  if(!active && boost<=0){ _bolts.length=0; return; }
  const base=Math.min(W,H)*0.235;
  const rIn=base*0.64, rOut=base*1.12;
  const c=S.col.b;
  _boltTimer-=dt;
  if(_boltTimer<=0){
    _boltTimer = active? (0.05+Math.random()*0.06) : 0.12;
    const count = active? (1+(Math.random()<0.4?1:0)) : (boost>0.15?1:0);
    _bolts=[];
    for(let k=0;k<count;k++){
      const a=Math.random()*Math.PI*2;
      _bolts.push({ pts:_makeBolt(a,rIn,rOut, base*0.16), life:1 });
    }
  }
  ctx.save(); ctx.translate(CX,CY);
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.shadowBlur=16*DPR; ctx.shadowColor=rgba(c,0.9);
  for(let i=_bolts.length-1;i>=0;i--){
    const b=_bolts[i];
    b.life -= dt*7;                 // very short-lived → flicker
    if(b.life<=0){ _bolts.splice(i,1); continue; }
    const p=b.pts;
    ctx.globalAlpha=Math.max(0,b.life)*0.8*S.ignite;   // fat soft underlay
    ctx.strokeStyle=rgba(c,0.5); ctx.lineWidth=3.2*DPR;
    ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]);
    for(let j=1;j<p.length;j++) ctx.lineTo(p[j][0],p[j][1]);
    ctx.stroke();
    ctx.globalAlpha=Math.max(0,b.life)*0.95*S.ignite;  // hot white core
    ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=1.2*DPR;
    ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]);
    for(let j=1;j<p.length;j++) ctx.lineTo(p[j][0],p[j][1]);
    ctx.stroke();
  }
  ctx.restore();
}

/* ── HOLOGRAPHIC VEIL ────────────────────────────────────────────
   Slow depth-parallax star drift behind the HUD + fine scanlines with a
   travelling bright band, so the whole screen reads as a projection. */
let _stars=null, _starW=0, _starH=0;
function _seedStars(){
  _stars=[]; _starW=W; _starH=H;
  const n=Math.round((W*H)/(26000*DPR));   // density scales with area
  for(let i=0;i<n;i++){
    const depth=Math.random();             // 0 far … 1 near
    _stars.push({ x:Math.random()*W, y:Math.random()*H, depth,
      size:(0.4+depth*1.3)*DPR, tw:Math.random()*Math.PI*2 });
  }
}
function drawHoloVeil(dt){
  const c=S.col.a, b=S.col.b;
  if(!_stars || _starW!==W || _starH!==H) _seedStars();
  ctx.save();
  for(const s of _stars){
    s.x -= (4+s.depth*16)*dt*DPR;           // nearer stars drift faster
    if(s.x < -2){ s.x=W+2; s.y=Math.random()*H; }
    s.tw += dt*2;
    const tw=0.35+0.65*(0.5+0.5*Math.sin(s.tw));
    ctx.globalAlpha=(0.10+0.28*s.depth)*tw*S.ignite;
    ctx.fillStyle=rgba(b,0.9);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
  }
  const gap=3*DPR;
  ctx.globalAlpha=0.05*S.ignite;
  ctx.fillStyle=rgba(c,0.6);
  for(let y=0;y<H;y+=gap) ctx.fillRect(0,y,W,1*DPR);
  const bandY=((S.t*0.06)%1)*H, bandH=90*DPR;    // slow travelling scan band
  const bg=ctx.createLinearGradient(0,bandY-bandH,0,bandY+bandH);
  bg.addColorStop(0,'rgba(0,0,0,0)');
  bg.addColorStop(0.5, rgba(b,0.10+0.05*S.level));
  bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=S.ignite; ctx.fillStyle=bg;
  ctx.fillRect(0,bandY-bandH,W,bandH*2);
  ctx.restore();
}

/* ═══ WebSocket bridge to Python core ══════════════════════════ */
let ws=null, reconnectT=null;
function connect(){
  try{ ws=new WebSocket('ws://127.0.0.1:8765'); }catch(e){ scheduleReconnect(); return; }
  ws.onopen=()=>{ setConn(true); try{ ws.send(JSON.stringify({type:'get_config'})); }catch(_){} };
  ws.onclose=()=>{ setConn(false); scheduleReconnect(); };
  ws.onerror=()=>{ try{ws.close();}catch(_){} };
  ws.onmessage=(ev)=>{ try{ handle(JSON.parse(ev.data)); }catch(e){} };
}
function scheduleReconnect(){ clearTimeout(reconnectT); reconnectT=setTimeout(connect, 1500); }
function setConn(on){
  const el=document.getElementById('conn');
  el.textContent = on? 'LINK: SECURE' : 'LINK: OFFLINE';
  el.classList.toggle('off', !on);
  if(!on && S.mode!=='offline'){ /* keep last visual */ }
}
connect();

function handle(m){
  switch(m.type){
    case 'state': setMode(m.state); break;
    case 'level': S.levelTarget=Math.max(S.levelTarget, Math.min(1, m.value||0)); break;
    case 'spectrum':
      if(Array.isArray(m.bins)){
        const n=S.spectrumTarget.length;
        for(let i=0;i<n;i++){ const src=m.bins[Math.floor(i*m.bins.length/n)]||0; S.spectrumTarget[i]=Math.min(1,src); }
        S.levelTarget=Math.max(S.levelTarget, m.level||0);
      }
      break;
    case 'user': showUser(m.text||''); break;
    case 'jarvis': typeJarvis(m.text||''); break;
    case 'telemetry': setTelem(m.cpu, m.mem); break;
    case 'brain': document.getElementById('brainVal').textContent='BRAIN: '+(m.name||'----').toUpperCase(); break;
    case 'status': document.getElementById('online').textContent=(m.text||'SYSTEM ONLINE').toUpperCase(); break;
    case 'config': applyConfigToPanel(m.config||{}); break;
    case 'pulse': triggerClap(); break;   // clap detected → shockburst
    case 'boot_done': finishBoot(); break;
  }
}

/* click the core to trigger push-to-talk */
canvas.addEventListener('click',(e)=>{
  const dx=e.clientX*DPR-CX, dy=e.clientY*DPR-CY;
  const base=Math.min(W,H)*0.235;
  if(Math.hypot(dx,dy) < base*0.7){
    if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'push_to_talk'}));
    triggerClap();                 // tapping the core feels like a clap
    setMode('listening');
  }
});
const $=(id)=>document.getElementById(id);
function isTyping(){ const a=document.activeElement; return a && (a.tagName==='INPUT'||a.tagName==='SELECT'||a.tagName==='TEXTAREA'); }

/* ═══ command bar (keyboard input) ═══════════════════════════ */
const cmdbar=$('cmdbar'), cmdinput=$('cmdinput');
function openCmd(){ cmdbar.classList.add('show'); setTimeout(()=>cmdinput.focus(),30); }
function closeCmd(){ cmdbar.classList.remove('show'); cmdinput.blur(); cmdinput.value=''; }
function sendCmd(){
  const t=cmdinput.value.trim(); if(!t) return;
  if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'text_command', text:t}));
  showUser(t); closeCmd();
}
$('cmdsend').addEventListener('click', sendCmd);
cmdinput.addEventListener('keydown',(e)=>{
  e.stopPropagation();
  if(e.key==='Enter'){ e.preventDefault(); sendCmd(); }
  else if(e.key==='Escape'){ e.preventDefault(); closeCmd(); }
});

/* ═══ settings panel ═════════════════════════════════════════ */
const settings=$('settings');
function applyConfigToPanel(c){
  c=c||{};
  if('brain' in c) $('set_brain').value=c.brain;
  if('ollama_model' in c) $('set_ollama_model').value=c.ollama_model||'';
  if('whisper_model' in c) $('set_whisper').value=c.whisper_model;
  if('tts_engine' in c) $('set_engine').value=c.tts_engine;
  if('tts_voice' in c) setSelectValue($('set_voice'), c.tts_voice);
  if('wakeword_threshold' in c){ $('set_wake').value=c.wakeword_threshold; $('wsval').textContent=Number(c.wakeword_threshold).toFixed(2); }
  if('enable_voice' in c) $('set_envoice').value=String(!!c.enable_voice);
  if('enable_clap' in c || 'clap_count' in c) $('set_clap').value=(c.enable_clap===false)?'off':String(c.clap_count||2);
  if('clap_sensitivity' in c){ $('set_clapsens').value=c.clap_sensitivity; $('csval').textContent=Number($('set_clapsens').value).toFixed(2); }
  if('user_title' in c) $('set_title').value=c.user_title||'';
  if(c.has_groq_key) $('set_groq_key').placeholder='key saved — leave blank to keep';
  toggleBrainFields();
}
function setSelectValue(sel,val){
  if(![...sel.options].some(o=>o.value===val) && val){
    const o=document.createElement('option'); o.value=val; o.textContent=val+' (custom)'; sel.appendChild(o);
  }
  sel.value=val;
}
function toggleBrainFields(){
  const b=$('set_brain').value;
  $('f_groq').classList.toggle('hide-field', b!=='groq');
  $('f_ollama').classList.toggle('hide-field', b!=='ollama');
}
function openSettings(){ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'get_config'})); settings.classList.add('show'); }
function closeSettings(){ settings.classList.remove('show'); }
function saveSettings(){
  const cfg={
    brain:$('set_brain').value, ollama_model:$('set_ollama_model').value.trim(),
    whisper_model:$('set_whisper').value, tts_engine:$('set_engine').value,
    tts_voice:$('set_voice').value, wakeword_threshold:parseFloat($('set_wake').value),
    enable_voice:$('set_envoice').value==='true', user_title:$('set_title').value.trim()||'sir',
    clap_sensitivity:parseFloat($('set_clapsens').value),
  };
  const clapv=$('set_clap').value;
  cfg.enable_clap = clapv!=='off';
  if(clapv!=='off') cfg.clap_count = parseInt(clapv);
  const gk=$('set_groq_key').value.trim(); if(gk) cfg.groq_api_key=gk;
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'set_config', config:cfg}));
  closeSettings();
}
$('gear').addEventListener('click', openSettings);
$('set_brain').addEventListener('change', toggleBrainFields);
$('set_wake').addEventListener('input', ()=>{ $('wsval').textContent=Number($('set_wake').value).toFixed(2); });
$('set_clapsens').addEventListener('input', ()=>{ $('csval').textContent=Number($('set_clapsens').value).toFixed(2); });
$('set_cancel').addEventListener('click', closeSettings);
$('set_save').addEventListener('click', saveSettings);
settings.addEventListener('click',(e)=>{ if(e.target===settings) closeSettings(); });

/* ═══ global keys ════════════════════════════════════════════ */
addEventListener('keydown',(e)=>{
  if(isTyping()){ if(e.key==='Escape') closeSettings(); return; }
  if(e.code==='Space'){ e.preventDefault(); if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'push_to_talk'})); }
  else if(e.key==='t'||e.key==='T'||e.key==='/'){ e.preventDefault(); openCmd(); }
  else if(e.key==='Escape'){ closeCmd(); closeSettings(); if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'stop'})); }
});

/* power-down button → tells Python to close the app */
document.getElementById('powerbtn').addEventListener('click',()=>{
  if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'quit'}));
  setMode('offline');
  document.getElementById('stateLabel').textContent='POWERING DOWN';
});
</script>
